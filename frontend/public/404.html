<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Model Monitoring Studio</title>
    <script>
      // GitHub Pages SPA redirect trick (https://github.com/rafgraph/spa-github-pages)
      // Redirect all 404s back to the SPA root, encoding the path in the query string
      // so React Router can decode it and navigate to the correct route.
      //
      // pathSegmentsToKeep = 1 keeps the repo name prefix in the URL
      // (e.g. /model-monitoring-studio/  →  keep 1 segment).
      // Set to 0 if deploying to a custom domain on the root path.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
